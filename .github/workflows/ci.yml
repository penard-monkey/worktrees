name: ci
on:
  push: { branches: [main] }
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: true }
      - name: shellcheck + bash -n + bash-3.2 gates
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q shellcheck
          make lint
      - name: bash 3.2 parse gate (real 3.2 via docker)
        run: docker run --rm -v "$PWD:/s" bash:3.2 bash -n /s/bin/worktrees

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with: { submodules: true }
      - name: install tmux (ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update -q && sudo apt-get install -y -q tmux
      - name: install tmux (macos)
        if: runner.os == 'macOS'
        run: brew install tmux
      - name: unit suite (shimmed tmux, system bash)
        run: make test
      - name: real-tmux smoke
        run: make test-real-tmux
      - name: full suite under REAL bash 3.2 (stock /bin/bash)
        if: runner.os == 'macOS'
        run: RUN_BASH=/bin/bash make test

  install:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: make install + smoke
        run: |
          make install BINDIR="$RUNNER_TEMP/xbin"
          "$RUNNER_TEMP/xbin/worktrees" --version
          "$RUNNER_TEMP/xbin/worktrees" help >/dev/null

  # Rust workspace: build/test worktrees-core + worktrees-cli only. The Tauri app
  # (app/src-tauri) is intentionally excluded here — it needs webkit/system deps
  # and gets its own job when the app CI lands (migration Increment 4/5).
  rust:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with: { submodules: true }
      - name: install tmux (ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update -q && sudo apt-get install -y -q tmux
      - name: install tmux (macos)
        if: runner.os == 'macOS'
        run: brew install tmux
      - name: build + test core/cli (GitHub runners ship Rust stable)
        run: |
          cargo build -p worktrees-core -p worktrees-cli --locked
          cargo test -p worktrees-core --locked
      - name: conformance — full bats suite vs the compiled Rust binary
        run: |
          make test-rust
          make test-rust-real-tmux
