name: ci
on:
  push: { branches: [main] }
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: true }
      - name: shellcheck + bash-3.2 gates
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q shellcheck
          make lint
      - name: bash 3.2 parse gate (real 3.2 via docker) — the shim
        run: docker run --rm -v "$PWD:/s" bash:3.2 bash -n /s/bin/worktrees

  # Rust unit tests + build (fast, no tmux).
  rust:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: build + test core/cli (GitHub runners ship Rust stable)
        run: |
          cargo build -p worktrees-core -p worktrees-cli --locked
          cargo test -p worktrees-core --locked

  # Default gate: the bats suite against the Rust binary (the shipped engine).
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with: { submodules: true }
      - name: install tmux (ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update -q && sudo apt-get install -y -q tmux
      - name: install tmux (macos)
        if: runner.os == 'macOS'
        run: brew install tmux
      - name: unit + real-tmux vs the Rust binary
        run: |
          make test
          make test-real-tmux

  install:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: make install (build release + symlink binary) + smoke
        run: |
          make install BINDIR="$RUNNER_TEMP/xbin"
          "$RUNNER_TEMP/xbin/worktrees" --version
          "$RUNNER_TEMP/xbin/worktrees" help >/dev/null
