name: release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: true }
      - name: gate — tag matches embedded version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          grep -q "^WORKTREES_VERSION=\"$tag\"$" bin/worktrees \
            || { echo "tag v$tag != WORKTREES_VERSION in bin/worktrees"; exit 1; }
      - name: lint + test
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q shellcheck tmux
          make check
      - name: checksums
        run: |
          mkdir -p dist && cp bin/worktrees dist/
          (cd dist && shasum -a 256 worktrees > checksums.txt && cat checksums.txt)
      - name: extract changelog section
        run: |
          v="${GITHUB_REF_NAME#v}"
          awk -v v="$v" '$0 ~ "^## \\["v"\\]" {f=1; next} /^## \[/ {f=0} f' CHANGELOG.md > dist/notes.md
          cat dist/notes.md
      - name: create GitHub release
        env: { GH_TOKEN: '${{ github.token }}' }
        run: |
          gh release create "$GITHUB_REF_NAME" dist/worktrees dist/checksums.txt \
            --title "worktrees $GITHUB_REF_NAME" --notes-file dist/notes.md
